            padding-bottom: 10px;

        }

        .branch-header .ico {
            font-size: 1.3rem;
            line-height: 1;
        }

            margin-left: auto;
            font-size: 0.8rem;
            color: #7a8fa5;
            transition: transform 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.04);
        }

        .branch-header .arrow.open {
            transform: rotate(180deg);
            background: rgba(26, 90, 138, 0.10);
            color: #1a5a8a;
        }

        .branch-body {
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.33, 1, 0.68, 1), opacity 0.3s ease, margin 0.3s;
            max-height: 1400px;
            opacity: 1;
        }

        .branch-body.collapsed {
            max-height: 0 !important;
            opacity: 0;
            margin: 0;
            padding-top: 0;
        }

        const container = document.getElementById('branchesContainer');

        function renderChild(child) {
            if (child.sub && child.sub.length) {
                const subItems = child.sub.map(s => {
                    const label = typeof s === 'string' ? s : s.label;
                    return `<li class="nested-item"><span class="ndot"></span>${label}</li>`;
                }).join('');
                return `
                <li class="child-item">
                    <span class="dot"></span>
                    <span class="label">${child.label}</span>
                    <span class="tag">${child.sub.length}</span>
                </li>
                <ul class="nested">${subItems}</ul>
            `;
            }
            return `
            <li class="child-item">
                <span class="dot"></span>
                <span class="label">${child.label}</span>
            </li>
        `;
        }

        function renderBranch(branch, idx) {
            const bodyId = `branchBody_${branch.id || idx}`;
            const childrenHtml = branch.children.map(c => renderChild(c)).join('');
            return `
            <div class="branch" data-color="${branch.color}" data-branch="${branch.id || idx}">
                <div class="branch-header" data-target="${bodyId}">
                    <span class="ico">${branch.icon || '▪'}</span>
                    ${branch.label}
                    <span class="arrow open" id="toggle_${bodyId}">▾</span>
                </div>
                <div class="branch-body" id="${bodyId}">
                    <ul class="child-list">
                        ${childrenHtml}
                    </ul>
                </div>
            </div>
        `;
        }

        container.innerHTML = data.map((b, i) => renderBranch(b, i)).join('');

        document.querySelectorAll('.branch-header').forEach(header => {
            header.addEventListener('click', function (e) {
                const targetId = this.dataset.target;
                if (!targetId) return;
                const body = document.getElementById(targetId);
                const toggle = document.getElementById(`toggle_${targetId}`);
                if (!body || !toggle) return;
                const isCollapsed = body.classList.contains('collapsed');
                if (isCollapsed) {
                    body.classList.remove('collapsed');
                    toggle.classList.add('open');
                    body.style.maxHeight = body.scrollHeight + 'px';
                    setTimeout(() => { body.style.maxHeight = 'none'; }, 420);
                } else {
                    body.style.maxHeight = body.scrollHeight + 'px';
                    void body.offsetHeight;
                    body.style.maxHeight = '0';
                    body.classList.add('collapsed');
                    toggle.classList.remove('open');
                }
            });
            header.setAttribute('role', 'button');
            header.setAttribute('tabindex', '0');
            header.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });
        });

        document.querySelectorAll('.branch-body').forEach(body => {
            body.style.maxHeight = body.classList.contains('collapsed') ? '0' : 'none';
        });
    </script>
</body>

</html>

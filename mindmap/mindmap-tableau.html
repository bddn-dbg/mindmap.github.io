<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau - Mind Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B1220;
            --bg-grid: rgba(255, 255, 255, 0.035);
            --panel: #101a2e;
            --panel-border: #1d2c47;
            --ink: #E6EDF7;
            --muted: #8694ab;
            --root: #67E8F9;
            --c1: #F2B84B;
            --c2: #2DD4BF;
            --c3: #FB7472;
            --c4: #9B8CFF;
            --c5: #4EA8DE;
            --c6: #A3E635;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
            background: var(--bg);
            background-image:
                linear-gradient(var(--bg-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 28px 28px;
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .canvas-wrap {
            position: relative;
            overflow: auto;
            width: 100%;
            height: 100vh;
            background: radial-gradient(ellipse 70% 50% at 18% 12%, rgba(103, 232, 249, 0.06), transparent 60%);
        }

        .toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: linear-gradient(180deg, rgba(11, 18, 32, 0.92), rgba(11, 18, 32, 0.65));
            backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--panel-border);
        }

        button {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12.5px;
            font-weight: 600;
            border-radius: 7px;
            border: 1px solid var(--panel-border);
            background: #15213a;
            color: var(--ink);
            padding: 9px 14px;
            cursor: pointer;
            transition: transform .12s ease, border-color .15s ease, background .15s ease;
        }

        button:hover {
            border-color: var(--root);
            background: #192742;
        }

        button:active {
            transform: translateY(1px);
        }

        .zoom-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            align-self: center;
            margin-left: 4px;
            min-width: 42px;
        }

        .spacer {
            flex: 1;
        }

        #tree-scaled {
            transform-origin: top left;
            padding: 50px 70px 100px;
        }

        #tree-inner {
            position: relative;
            display: inline-block;
        }

        .node-wrapper {
            display: flex;
            align-items: center;
        }

        .node-children {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 18px;
            margin-left: 78px;
        }

        .node-self {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            gap: 2px;
            padding: 10px 18px;
            border-radius: 9px;
            border: 1.5px solid var(--c, var(--root));
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015));
            box-shadow:
                0 4px 16px -8px rgba(0, 0, 0, 0.7),
                0 0 16px -6px var(--c, var(--root));
            white-space: nowrap;
            z-index: 2;
            opacity: 0;
            animation: pop-in .42s cubic-bezier(.2, .8, .2, 1) forwards;
            animation-delay: var(--delay, 0s);
        }

        @keyframes pop-in {
            from {
                opacity: 0;
                transform: scale(.85);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .node-self.is-root {
            padding: 14px 22px;
            border-width: 2px;
            font-size: 15.5px;
        }

        .n-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: var(--ink);
        }

        .node-self.is-root .n-title {
            font-size: 15.5px;
            color: var(--root);
        }

        .n-detail {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.5px;
            color: var(--muted);
        }

        .toggle {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 19px;
            height: 19px;
            border-radius: 50%;
            background: #0b1220;
            border: 1.5px solid var(--c, var(--root));
            color: var(--ink);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            user-select: none;
        }

        .toggle:hover {
            box-shadow: 0 0 10px -2px var(--c, var(--root));
        }

        svg.connectors {
            position: absolute;
            top: 0;
            left: 0;
            overflow: visible;
            z-index: 1;
            pointer-events: none;
        }

        svg.connectors path {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
        }

        svg.connectors circle {
            r: 3;
        }
    </style>
</head>

sed":false,"depth":2,"color":"c1"}],"collapsed":false,"depth":1,"color":"c1"},{"id":98,"title":"8. Stories","detail":null,"children":[{"id":99,"title":"Story Points","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c2"},{"id":100,"title":"Creating Story","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c2"},{"id":101,"title":"Navigation","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c2"},{"id":102,"title":"Presentation Flow","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c2"}],"collapsed":false,"depth":1,"color":"c2"},{"id":103,"title":"9. Publishing & Sharing","detail":null,"children":[{"id":104,"title":"Publishing Workbook","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c3"},{"id":105,"title":"Tableau Public","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c3"},{"id":106,"title":"Tableau Server","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c3"},{"id":107,"title":"Tableau Cloud","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c3"},{"id":108,"title":"Export PDF","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c3"},{"id":109,"title":"Export Image","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c3"},{"id":110,"title":"Share Dashboard","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c3"}],"collapsed":false,"depth":1,"color":"c3"},{"id":111,"title":"10. Best Practices","detail":null,"children":[{"id":112,"title":"Choose Correct Chart","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c4"},{"id":113,"title":"Use Meaningful Colors","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c4"},{"id":114,"title":"Keep Dashboard Clean","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c4"},{"id":115,"title":"Minimize Filters","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c4"},{"id":116,"title":"Optimize Performance","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c4"},{"id":117,"title":"Interactive Dashboards","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c4"},{"id":118,"title":"Storytelling with Data","detail":null,"children":[],"collapsed":false,"depth":2,"color":"c4"}],"collapsed":false,"depth":1,"color":"c4"}],"collapsed":false,"depth":0,"color":null};
        let zoom = 1;

        const elTreeInner = document.getElementById('tree-inner');
        const elTreeScaled = document.getElementById('tree-scaled');
        const elZoomLabel = document.getElementById('zoom-label');

        function buildNodeWrapper(node, orderIndex) {
            const wrapper = document.createElement('div');
            wrapper.className = 'node-wrapper';

            const self = document.createElement('div');
            self.className = 'node-self' + (node.depth === 0 ? ' is-root' : '');
            self.dataset.id = node.id;
            if (node.color) self.style.setProperty('--c', `var(--${node.color})`);
            self.style.setProperty('--delay', (Math.min(orderIndex, 14) * 0.035) + 's');

            const titleEl = document.createElement('div');
            titleEl.className = 'n-title';
            titleEl.textContent = node.title;
            self.appendChild(titleEl);

            if (node.detail) {
                const detailEl = document.createElement('div');
                detailEl.className = 'n-detail';
                detailEl.textContent = node.detail;
                self.appendChild(detailEl);
            }

            if (node.children.length > 0) {
                const toggle = document.createElement('div');
                toggle.className = 'toggle';
                toggle.textContent = node.collapsed ? '+' : '−';
                toggle.title = node.collapsed ? 'Expand' : 'Collapse';
                toggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    node.collapsed = !node.collapsed;
                    render();
                });
                self.appendChild(toggle);
            }

            wrapper.appendChild(self);

            if (node.children.length > 0 && !node.collapsed) {
                const childrenBox = document.createElement('div');
                childrenBox.className = 'node-children';
                node.children.forEach((child, i) => {
                    childrenBox.appendChild(buildNodeWrapper(child, orderIndex + i + 1));
                });
                wrapper.appendChild(childrenBox);
            }

            return wrapper;
        }

        function drawConnectors() {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', 'connectors');
            svg.setAttribute('width', elTreeInner.scrollWidth);
            svg.setAttribute('height', elTreeInner.scrollHeight);

            function walk(node) {
                if (node.children.length === 0 || node.collapsed) return;
                const parentEl = elTreeInner.querySelector(`.node-self[data-id="${node.id}"]`);
                if (!parentEl) return;
                const px = parentEl.offsetLeft + parentEl.offsetWidth;
                const py = parentEl.offsetTop + parentEl.offsetHeight / 2;

                node.children.forEach(child => {
                    const childEl = elTreeInner.querySelector(`.node-self[data-id="${child.id}"]`);
                    if (!childEl) return;
                    const cx = childEl.offsetLeft;
                    const cy = childEl.offsetTop + childEl.offsetHeight / 2;
                    const midX = px + (cx - px) * 0.5;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M ${px},${py} C ${midX},${py} ${midX},${cy} ${cx},${cy}`);
                    path.setAttribute('stroke', `var(--${child.color || 'root'})`);
                    path.setAttribute('opacity', '0.75');
                    svg.appendChild(path);

                    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    dot.setAttribute('cx', cx);
                    dot.setAttribute('cy', cy);
                    dot.setAttribute('fill', `var(--${child.color || 'root'})`);
                    svg.appendChild(dot);

                    walk(child);
                });
            }
            walk(treeData);
            elTreeInner.appendChild(svg);
        }

        function updateScaledSize() {
            const w = elTreeInner.scrollWidth;
            const h = elTreeInner.scrollHeight;
            elTreeScaled.style.transform = `scale(${zoom})`;
            elTreeScaled.style.width = (w * zoom + 140) + 'px';
            elTreeScaled.style.height = (h * zoom + 100) + 'px';
            elZoomLabel.textContent = Math.round(zoom * 100) + '%';
        }

        function render() {
            if (!treeData) return;
            elTreeInner.innerHTML = '';
            elTreeInner.style.position = 'relative';
            elTreeInner.appendChild(buildNodeWrapper(treeData, 0));
            requestAnimationFrame(() => {
                drawConnectors();
                updateScaledSize();
            });
        }

        function setAllCollapsed(node, value, isRoot = true) {
            if (!isRoot) node.collapsed = value;
            node.children.forEach(c => setAllCollapsed(c, value, false));
        }

        document.getElementById('btn-expand').addEventListener('click', () => { setAllCollapsed(treeData, false); render(); });
        document.getElementById('btn-collapse').addEventListener('click', () => { setAllCollapsed(treeData, true); render(); });

        document.getElementById('zoom-in').addEventListener('click', () => { zoom = Math.min(1.8, +(zoom + 0.1).toFixed(2)); updateScaledSize(); });
        document.getElementById('zoom-out').addEventListener('click', () => { zoom = Math.max(0.4, +(zoom - 0.1).toFixed(2)); updateScaledSize(); });
        document.getElementById('zoom-reset').addEventListener('click', () => { zoom = 1; updateScaledSize(); });

        render();
    </script>
</body>
